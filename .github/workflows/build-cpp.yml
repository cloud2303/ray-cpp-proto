name: Build C++ Protobuf
on:
  schedule:
    - cron: "00 20 * * *"
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: "x64-linux"
  # 启用二进制缓存，利用你配置的 GitHub Packages 节省编译时间
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"
  USERNAME: ${{ github.repository_owner }}
  FEED_URL: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
  GH_TOKEN: ${{ secrets.CI_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global advice.detachedHead false

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          ref: aa2d37682e3318d93aef87efa7b0e88e81cd3d59

      - name: Install Build Essentials
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y mono-complete ninja-build zip gcc-14 g++-14
          # 固定使用 GCC 14.3，确保 vcpkg 二进制缓存（nuget）ABI 一致可复用
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          gcc --version
          g++ --version

      - name: Bootstrap vcpkg
        run: ${{ env.VCPKG_ROOT }}/bootstrap-vcpkg.sh

      - name: Configure NuGet Source
        shell: bash
        run: |
          NUGET_EXE=$(${{ env.VCPKG_ROOT }}/vcpkg fetch nuget | tail -n 1)
          mono "$NUGET_EXE" sources remove -Name "GitHubPackages" || true
          mono "$NUGET_EXE" sources add \
            -Source "${FEED_URL}" \
            -StorePasswordInClearText \
            -Name "GitHubPackages" \
            -UserName "${USERNAME}" \
            -Password "${GH_TOKEN}"
          mono "$NUGET_EXE" setapikey "${GH_TOKEN}" -Source "${FEED_URL}"

      - name: Install Tools via vcpkg
        run: |
          # 核心步骤：安装与本地版本一致的 protobuf 和 grpc
          ${{ env.VCPKG_ROOT }}/vcpkg install --triplet x64-linux

      - name: Transform proto to C++
        run: |
          release_status="0"
          release_version="$(date "+%Y%m%d%H%M%S")"
          repo_version="$(curl -sL https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')"

          # 定义 vcpkg 路径变量
          VCPKG_INSTALLED="${{ github.workspace }}/vcpkg_installed/x64-linux"
          PROTOC_EXE="$VCPKG_INSTALLED/tools/protobuf/protoc"
          GRPC_PLUGIN="$VCPKG_INSTALLED/tools/grpc/grpc_cpp_plugin"

          chmod +x $PROTOC_EXE
          chmod +x $GRPC_PLUGIN

          # 1. 检查版本更新 (Xray)
          xray_version="$(curl -sL https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r '.tag_name')"
          if [ "$repo_version" = "null" ] || [ ! -f xray-version ] || [ "$xray_version" != "$(cat xray-version)" ]; then
            echo "$xray_version" > xray-version
            git add xray-version
            if ! git diff --cached --quiet; then
              git commit -m "Bump Xray-core to $xray_version"
              release_status="1"
            fi
          fi

          # 2. 检查版本更新 (v2ray)
          v2ray_version="$(curl -sL https://api.github.com/repos/v2fly/v2ray-core/releases/latest | jq -r '.tag_name')"
          if [ "$repo_version" = "null" ] || [ ! -f v2ray-version ] || [ "$v2ray_version" != "$(cat v2ray-version)" ]; then
            echo "$v2ray_version" > v2ray-version
            git add v2ray-version

            if ! git diff --cached --quiet; then
              git commit -m "Bump v2ray-core to $v2ray_version"
              release_status="1"
            fi
          fi

          # 3. 如果有更新，开始构建
          if [ "$release_status" = "1" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            git push
            mkdir -p "$release_version"

            # 处理 Xray-core
            mkdir -p "$release_version/Xray-cpp-$xray_version"
            git clone -b "$xray_version" --depth 1 https://github.com/XTLS/Xray-core.git
            # 修正 router/config.proto 中的 Domain 字段名称冲突问题
            sed -i 's/Domain = 2;/RootDomain = 2;/g' Xray-core/app/router/config.proto
            # 使用 vcpkg 编译出的编译器和插件
            find Xray-core -type f -name "*.proto" -exec $PROTOC_EXE \
              --proto_path=Xray-core \
              --cpp_out="$release_version/Xray-cpp-$xray_version" \
              --grpc_out="$release_version/Xray-cpp-$xray_version" \
              --plugin=protoc-gen-grpc=$GRPC_PLUGIN \
              {} \;

            # 处理 v2ray-core
            mkdir -p "$release_version/v2ray-cpp-$v2ray_version"
            git clone -b "$v2ray_version" --depth 1 https://github.com/v2fly/v2ray-core.git
            
            find v2ray-core -type f -name "*.proto" -exec $PROTOC_EXE \
              --proto_path=v2ray-core \
              --cpp_out="$release_version/v2ray-cpp-$v2ray_version" \
              --grpc_out="$release_version/v2ray-cpp-$v2ray_version" \
              --plugin=protoc-gen-grpc=$GRPC_PLUGIN \
              {} \;

            # 下载 Geo 资源
            mkdir -p "$release_version/geo-assets"
            curl -sL https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -o "$release_version/geo-assets/geoip.dat"
            curl -sL https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat -o "$release_version/geo-assets/geosite.dat"

            # 打包并发布
            cd "$release_version"
            zip -q -r "Xray-cpp-$xray_version.zip" "Xray-cpp-$xray_version"
            zip -q -r "v2ray-cpp-$v2ray_version.zip" "v2ray-cpp-$v2ray_version"
            zip -q -r "geo-assets.zip" "geo-assets"
            cd ..

            gh release create "$release_version" --generate-notes "$release_version"/*.zip
          fi
